<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant Control Plane MVP</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>AI Assistant Control Plane (MVP)</h1>
      <p class="subtitle">Bounded autonomy · Deny-by-default · HITL for high risk</p>
    </div>
    <div class="chips" id="chips">
      <span class="chip" id="chip-correlation">Correlation: —</span>
      <span class="chip" id="chip-risk">Risk: —</span>
      <span class="chip" id="chip-decision">Decision: —</span>
      <span class="chip" id="chip-mode">Mode: —</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel left">
      <h2>Chat</h2>
      <form id="chat-form">
        <label>Message
          <textarea id="message" required placeholder="Ask about a claim or start an appeal..."></textarea>
        </label>
        <div class="row">
          <label>Channel
            <select id="channel">
              <option value="chat">chat</option>
              <option value="voice">voice</option>
            </select>
          </label>
          <label>User role
            <select id="userRole">
              <option value="MEMBER">MEMBER</option>
              <option value="AGENT">AGENT</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Demo user
            <select id="userId">
              <option value="demo-user-1">demo-user-1 (member-001)</option>
              <option value="demo-user-2">demo-user-2 (member-002)</option>
              <option value="demo-agent-1">demo-agent-1 (agent)</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Approval ID (optional for HITL)
            <input id="approvalId" type="text" placeholder="approval-123" />
          </label>
        </div>
        <button type="submit">Send</button>
      </form>

      <h3>Transcript</h3>
      <div id="transcript" class="transcript"></div>
    </section>

    <section class="panel right">
      <div class="tabs">
        <button class="tab active" data-tab="intent">Intent</button>
        <button class="tab" data-tab="policy">Policy</button>
        <button class="tab" data-tab="tools">Tools</button>
        <button class="tab" data-tab="audit">Audit</button>
      </div>
      <div class="tabcontent" id="tab-intent"></div>
      <div class="tabcontent hidden" id="tab-policy"></div>
      <div class="tabcontent hidden" id="tab-tools"></div>
      <div class="tabcontent hidden" id="tab-audit"></div>

      <h3>Flow (simplified)</h3>
      <pre class="diagram" id="diagram">
User → Intent → Policy Gate → Tool Allowlist → Executor → Response/Audit
      </pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>

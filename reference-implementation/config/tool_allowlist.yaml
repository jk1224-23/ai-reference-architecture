# Tool Allowlist (deny-by-default)
# Mapping: intent -> allowed tools + approval requirements
version: "1.0"
default:
  tool_access: "DENY"

intents:
  POLICY_EXPLANATION:
    risk_tier: LOW
    allowed_tools: []
    mode: "KB_ONLY"

  FAQ_GENERAL:
    risk_tier: LOW
    allowed_tools: []
    mode: "KB_ONLY"

  CLAIM_STATUS:
    risk_tier: MEDIUM
    allowed_tools:
      - name: "claims.read.v1"
        requires_approval: false
        tool_type: "READ_ONLY"

  ELIGIBILITY_VERIFY:
    risk_tier: MEDIUM
    allowed_tools:
      - name: "eligibility.read.v1"
        requires_approval: false
        tool_type: "READ_ONLY"

  PROVIDER_SEARCH:
    risk_tier: LOW
    allowed_tools:
      - name: "providerDirectory.search.v1"
        requires_approval: false
        tool_type: "READ_ONLY"

  CASE_CREATE:
    risk_tier: HIGH
    allowed_tools:
      - name: "case.create.v1"
        requires_approval: true
        approval_type: "HITL"
        tool_type: "TRANSACTIONAL"

  APPEAL_INITIATION:
    risk_tier: HIGH
    allowed_tools:
      - name: "case.create.v1"
        requires_approval: true
        approval_type: "HITL"
        tool_type: "TRANSACTIONAL"
    notes: "Appeals/grievances are supervised. Assistant drafts; human approves."

  MEMBER_UPDATE:
    risk_tier: HIGH
    allowed_tools:
      - name: "member.update.v1"
        requires_approval: true
        approval_type: "HITL"
        tool_type: "TRANSACTIONAL"
    notes: "High risk; requires step-up auth + strict field allowlist."
